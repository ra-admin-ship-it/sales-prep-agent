<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商談前準備エージェント</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --surface3: #1e2d47;
    --gold: #c9a227;
    --gold-light: #e8c547;
    --gold-dim: rgba(201,162,39,0.15);
    --text: #e8eaf0;
    --text-dim: #8892a4;
    --green: #34d399;
    --red: #f87171;
    --blue: #60a5fa;
    --border: rgba(201,162,39,0.2);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-icon {
    width: 42px; height: 42px;
    background: var(--gold-dim);
    border: 1px solid var(--gold);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header-text h1 {
    font-size: 18px; font-weight: 700; color: var(--gold);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.04em;
  }
  .header-text p { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .status-pill {
    margin-left: auto;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    background: rgba(52, 211, 153, 0.1);
    border: 1px solid rgba(52, 211, 153, 0.3);
    color: var(--green);
    display: flex; align-items: center; gap: 6px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* Main */
  main {
    flex: 1;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  /* URL Input Card */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }
  .input-card label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--gold);
    margin-bottom: 10px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
  }
  .url-input-row {
    display: flex;
    gap: 10px;
  }
  .url-input-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid rgba(201,162,39,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
    outline: none;
    transition: border-color 0.2s;
  }
  .url-input-row input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-dim);
  }
  .url-input-row input::placeholder { color: var(--text-dim); }
  .btn-analyze {
    background: linear-gradient(135deg, var(--gold) 0%, #a07a15 100%);
    color: #0a0e1a;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-analyze:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-analyze:active { transform: translateY(0); }
  .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Options Row */
  .options-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .option-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    background: var(--surface2);
    border: 1px solid rgba(201,162,39,0.15);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .option-chip.active {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold-light);
  }
  .option-chip input[type="checkbox"] { display: none; }

  /* Progress Steps */
  .progress-section {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
  }
  .progress-section.visible { display: block; }
  .progress-title {
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
  }
  .steps {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    background: var(--surface2);
    font-size: 13px;
    transition: background 0.3s;
  }
  .step.active { background: rgba(201,162,39,0.1); border: 1px solid rgba(201,162,39,0.2); }
  .step.done { background: rgba(52, 211, 153, 0.06); }
  .step-icon {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    background: var(--surface3);
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .step.active .step-icon { background: var(--gold); color: #0a0e1a; animation: spin 1s linear infinite; }
  .step.done .step-icon { background: rgba(52,211,153,0.2); color: var(--green); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .step-label { flex: 1; }
  .step-status { font-size: 11px; color: var(--text-dim); margin-left: auto; font-family: 'Space Mono', monospace; }

  /* Result Card */
  .result-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .result-card.visible { display: block; }

  .result-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .result-tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    padding: 12px 18px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    background: transparent;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  .result-content {
    padding: 24px;
    max-height: 480px;
    overflow-y: auto;
    font-size: 13.5px;
    line-height: 1.75;
  }
  .result-content::-webkit-scrollbar { width: 6px; }
  .result-content::-webkit-scrollbar-track { background: var(--surface2); }
  .result-content::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  .section-block { margin-bottom: 22px; }
  .section-block h3 {
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-family: 'Space Mono', monospace;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-block h3::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-block p { color: var(--text-dim); margin-bottom: 6px; }
  .bullet-list { list-style: none; }
  .bullet-list li {
    padding: 5px 0 5px 16px;
    position: relative;
    color: var(--text-dim);
  }
  .bullet-list li::before {
    content: '▸';
    position: absolute; left: 0;
    color: var(--gold);
    font-size: 11px;
  }

  .hypothesis-card {
    background: var(--surface2);
    border: 1px solid rgba(201,162,39,0.15);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 10px;
  }
  .hypothesis-card .hc-title {
    font-size: 13px; font-weight: 600; color: var(--text);
    margin-bottom: 4px;
  }
  .hypothesis-card .hc-body { font-size: 12px; color: var(--text-dim); line-height: 1.6; }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    margin: 2px;
  }
  .tag-high { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
  .tag-mid { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
  .tag-low { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }

  .question-item {
    display: flex;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 8px;
    margin-bottom: 8px;
    align-items: flex-start;
  }
  .q-num {
    width: 22px; height: 22px;
    background: var(--gold-dim);
    border: 1px solid rgba(201,162,39,0.3);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    color: var(--gold);
    font-family: 'Space Mono', monospace;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* Action Row */
  .action-row {
    display: none;
    gap: 12px;
    align-items: center;
    padding: 16px 24px;
    background: var(--surface2);
    border-top: 1px solid var(--border);
  }
  .action-row.visible { display: flex; }
  .btn-notion {
    background: linear-gradient(135deg, #2383e2 0%, #1a5db5 100%);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-notion:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-notion:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-copy {
    background: var(--surface3);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-copy:hover { background: var(--surface2); }
  .notion-result {
    margin-left: auto;
    font-size: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .notion-result a { color: var(--blue); text-decoration: none; }
  .notion-result a:hover { text-decoration: underline; }

  /* Loading dots */
  .loading-dots span {
    animation: blink 1.2s infinite;
    opacity: 0;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }

  /* Error */
  .error-msg {
    display: none;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--red);
    margin-top: 12px;
  }
  .error-msg.visible { display: block; }

  /* Streaming cursor */
  .stream-cursor {
    display: inline-block;
    width: 2px; height: 14px;
    background: var(--gold);
    margin-left: 2px;
    animation: blink-cursor 0.8s infinite;
    vertical-align: middle;
  }
  @keyframes blink-cursor { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--gold);
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 9999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo-icon">🔍</div>
  <div class="header-text">
    <h1>PRE-SALES AGENT</h1>
    <p>商談前準備 × 企業分析 × Notion自動起票</p>
  </div>
  <div class="status-pill">
    <span class="status-dot"></span>
    READY
  </div>
</header>

<main>
  <!-- Input -->
  <div class="input-card">
    <label>企業URL を入力</label>
    <div class="url-input-row">
      <input type="url" id="companyUrl" placeholder="https://example.co.jp" />
      <button class="btn-analyze" id="btnAnalyze" onclick="startAnalysis()">分析スタート ▶</button>
    </div>
    <div class="options-row" id="optionsRow">
      <label class="option-chip active" onclick="toggleChip(this)">
        <input type="checkbox" checked> 🏢 会社概要
      </label>
      <label class="option-chip active" onclick="toggleChip(this)">
        <input type="checkbox" checked> 🎯 採用状況
      </label>
      <label class="option-chip active" onclick="toggleChip(this)">
        <input type="checkbox" checked> ⚔️ 競合分析
      </label>
      <label class="option-chip active" onclick="toggleChip(this)">
        <input type="checkbox" checked> 💡 課題仮説
      </label>
      <label class="option-chip active" onclick="toggleChip(this)">
        <input type="checkbox" checked> 📋 商談質問
      </label>
      <label class="option-chip active" onclick="toggleChip(this)">
        <input type="checkbox" checked> 📝 Notion起票
      </label>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Progress -->
  <div class="progress-section" id="progressSection">
    <div class="progress-title">分析中<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span></div>
    <div class="steps" id="stepsContainer">
      <div class="step" id="step1" data-label="企業URLのクロール・情報収集">
        <div class="step-icon">1</div>
        <span class="step-label">企業URLのクロール・情報収集</span>
        <span class="step-status" id="step1-status">待機中</span>
      </div>
      <div class="step" id="step2" data-label="会社概要・事業特徴の分析">
        <div class="step-icon">2</div>
        <span class="step-label">会社概要・事業特徴の分析</span>
        <span class="step-status" id="step2-status">待機中</span>
      </div>
      <div class="step" id="step3" data-label="採用状況・競合調査">
        <div class="step-icon">3</div>
        <span class="step-label">採用状況・競合調査</span>
        <span class="step-status" id="step3-status">待機中</span>
      </div>
      <div class="step" id="step4" data-label="課題仮説・営業提案の生成">
        <div class="step-icon">4</div>
        <span class="step-label">課題仮説・営業提案の生成</span>
        <span class="step-status" id="step4-status">待機中</span>
      </div>
      <div class="step" id="step5" data-label="Notion議事録DBへ起票" id="step5">
        <div class="step-icon">5</div>
        <span class="step-label">Notion 議事録DBへ起票</span>
        <span class="step-status" id="step5-status">待機中</span>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-tabs" id="resultTabs">
      <button class="tab-btn active" onclick="showTab(0)" id="tab0">📊 概要</button>
      <button class="tab-btn" onclick="showTab(1)" id="tab1">🎯 採用状況</button>
      <button class="tab-btn" onclick="showTab(2)" id="tab2">⚔️ 競合分析</button>
      <button class="tab-btn" onclick="showTab(3)" id="tab3">💡 課題仮説</button>
      <button class="tab-btn" onclick="showTab(4)" id="tab4">🗣️ 営業提案</button>
      <button class="tab-btn" onclick="showTab(5)" id="tab5">❓ 商談質問</button>
      <button class="tab-btn" onclick="showTab(6)" id="tab6">🤝 JP価値提供</button>
    </div>
    <div class="result-content" id="resultContent">
      <div class="section-block" id="panelContent"><!-- filled by JS --></div>
    </div>
    <div class="action-row" id="actionRow">
      <button class="btn-notion" id="btnNotion" onclick="sendToNotion()">
        <span>📋</span> Notionへ起票
      </button>
      <button class="btn-copy" onclick="copyAll()">📋 全文コピー</button>
      <div class="notion-result" id="notionResult"></div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
let analysisResult = null;
let activeTab = 0;
const tabs = ['overview','hiring','competitive','hypothesis','proposal','questions','value'];

function toggleChip(el) {
  el.classList.toggle('active');
  const cb = el.querySelector('input');
  cb.checked = !cb.checked;
}

function showToast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function showTab(idx) {
  activeTab = idx;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  if (analysisResult) renderPanel(idx);
}

function setStep(idx, state) {
  const step = document.getElementById('step'+idx);
  const status = document.getElementById('step'+idx+'-status');
  step.className = 'step ' + state;
  if (state === 'active') { step.querySelector('.step-icon').textContent = '⟳'; status.textContent = '処理中'; }
  else if (state === 'done') { step.querySelector('.step-icon').textContent = '✓'; status.textContent = '完了'; }
  else { step.querySelector('.step-icon').textContent = idx; status.textContent = '待機中'; }
}

async function startAnalysis() {
  const url = document.getElementById('companyUrl').value.trim();
  if (!url) { showError('企業URLを入力してください'); return; }
  if (!url.startsWith('http')) { showError('有効なURL（https://...）を入力してください'); return; }

  document.getElementById('errorMsg').classList.remove('visible');
  document.getElementById('btnAnalyze').disabled = true;
  document.getElementById('progressSection').classList.add('visible');
  document.getElementById('resultCard').classList.remove('visible');
  document.getElementById('actionRow').classList.remove('visible');

  [1,2,3,4,5].forEach(i => setStep(i, 'waiting'));

  try {
    const result = await runAnalysis(url);
    analysisResult = result;
    renderAllTabs();
    document.getElementById('resultCard').classList.add('visible');
    document.getElementById('actionRow').classList.add('visible');
    setStep(5, 'done');
    showToast('✅ 分析完了！Notionへの起票が可能です');
  } catch(e) {
    showError('分析中にエラーが発生しました: ' + e.message);
    [1,2,3,4,5].forEach(i => setStep(i, ''));
  } finally {
    document.getElementById('btnAnalyze').disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
}

async function runAnalysis(url) {
  // Step 1: Crawl
  setStep(1, 'active');
  await delay(300);

  const systemPrompt = `あなたは採用コンサルティング会社「株式会社JOB PALETTE（Partage）」の営業支援AIです。
JOB PALETTEについて：https://job-palette.co.jp/
- 人材紹介（RA/CA業務）、RPO、スカウト代行、メディア代理店営業を展開
- 強み：IT・スタートアップ・成長企業への採用支援、Z世代採用（SNS活用）、KPIドリブンな採用伴走
- 営業スタイル：採用コンサルとして中長期の採用パートナーになることを目指す

企業URLが渡されます。Web検索を使って企業情報を詳細に調査し、以下の9セクションを含むJSONを返してください。
JSONのみ返し、前後のコードブロック記号は不要です。

{
  "companyName": "企業名",
  "overview": {
    "business": "事業内容（3〜5文）",
    "services": ["主要サービス1", "主要サービス2", ...],
    "targetMarket": "ターゲット市場",
    "employeeCount": "従業員数（わかれば）",
    "founded": "設立年（わかれば）",
    "stage": "上場/未上場/スタートアップ等"
  },
  "businessFeatures": {
    "advantages": ["競争優位性1", "競争優位性2"],
    "strengths": ["プロダクト強み1", "プロダクト強み2"],
    "growthAreas": ["成長領域1", "成長領域2"]
  },
  "hiring": {
    "currentPositions": ["採用ポジション1", "採用ポジション2"],
    "highVolumeRoles": ["多い職種1", "多い職種2"],
    "expandingDepts": ["拡大部署1", "拡大部署2"],
    "hiringVolume": "採用規模（年間概算）",
    "usedMedia": ["使用媒体1", "使用媒体2"]
  },
  "competitive": {
    "sameMarket": ["競合1", "競合2"],
    "similarService": ["類似サービス企業1", "類似サービス企業2"],
    "hiringCompetitors": ["採用競合1", "採用競合2"]
  },
  "hypothesis": {
    "challenges": [
      {"title": "課題タイトル", "description": "詳細説明", "severity": "high/mid/low"},
      {"title": "課題タイトル2", "description": "詳細説明", "severity": "high/mid/low"}
    ],
    "difficultPositions": ["難易度高ポジション1", "難易度高ポジション2"],
    "marketCompetition": "採用市場での競争状況の説明"
  },
  "proposal": {
    "targetRoles": ["人材紹介で支援できる職種1", "支援できる職種2"],
    "strategyAngle": ["提案の切り口1", "提案の切り口2"],
    "talkingPoints": ["トーク切り口1", "トーク切り口2", "トーク切り口3"]
  },
  "questions": [
    "商談で確認すべき質問1（具体的に）",
    "質問2",
    "質問3",
    "質問4",
    "質問5",
    "質問6",
    "質問7"
  ],
  "jpValue": {
    "matchPoints": ["JOB PALETTEが価値提供できるポイント1", "ポイント2", "ポイント3"],
    "uniqueStrength": "この企業に対するJOB PALETTEの独自強みの説明",
    "proposedServices": ["提案すべきサービス1", "提案すべきサービス2"]
  },
  "notionTitle": "【新規】商談前調査_企業名_YYYY-MM-DD形式のタイトル"
}`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      system: systemPrompt,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: `以下の企業URLを分析し、指定のJSONフォーマットで返してください。今日の日付は${new Date().toLocaleDateString('ja-JP')}です。\n\n企業URL: ${url}` }]
    })
  });

  setStep(1, 'done');
  setStep(2, 'active');
  await delay(200);

  if (!response.ok) {
    const err = await response.json();
    throw new Error(err.error?.message || 'API Error');
  }

  const data = await response.json();
  setStep(2, 'done');
  setStep(3, 'active');
  await delay(200);

  // Extract text from content blocks
  let rawText = '';
  for (const block of data.content || []) {
    if (block.type === 'text') rawText += block.text;
  }

  setStep(3, 'done');
  setStep(4, 'active');
  await delay(200);

  // Parse JSON
  let parsed;
  try {
    const clean = rawText.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
    parsed = JSON.parse(clean);
  } catch(e) {
    // Try to extract JSON
    const match = rawText.match(/\{[\s\S]*\}/);
    if (match) {
      try { parsed = JSON.parse(match[0]); }
      catch { throw new Error('JSONの解析に失敗しました。再度お試しください。'); }
    } else {
      throw new Error('レスポンスの解析に失敗しました。');
    }
  }

  setStep(4, 'done');
  setStep(5, 'active');
  await delay(300);

  return parsed;
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

function renderAllTabs() {
  renderPanel(activeTab);
}

function renderPanel(idx) {
  const el = document.getElementById('panelContent');
  const r = analysisResult;
  if (!r) return;

  let html = '';

  if (idx === 0) {
    // Overview
    html += section('会社概要', `
      <p>${r.overview?.business || ''}</p>
      ${r.overview?.employeeCount ? `<p><strong>従業員数:</strong> ${r.overview.employeeCount}</p>` : ''}
      ${r.overview?.founded ? `<p><strong>設立:</strong> ${r.overview.founded}</p>` : ''}
      ${r.overview?.stage ? `<p><strong>ステージ:</strong> ${r.overview.stage}</p>` : ''}
      ${r.overview?.targetMarket ? `<p><strong>ターゲット市場:</strong> ${r.overview.targetMarket}</p>` : ''}
    `);
    html += section('主要サービス', bulletList(r.overview?.services));
    html += section('事業の特徴', `
      ${r.businessFeatures?.advantages?.length ? '<p><strong>競争優位性</strong></p>' + bulletList(r.businessFeatures.advantages) : ''}
      ${r.businessFeatures?.growthAreas?.length ? '<p style="margin-top:8px"><strong>成長領域</strong></p>' + bulletList(r.businessFeatures.growthAreas) : ''}
    `);
  } else if (idx === 1) {
    // Hiring
    html += section('現在の採用ポジション', bulletList(r.hiring?.currentPositions));
    html += section('採用人数の多い職種', bulletList(r.hiring?.highVolumeRoles));
    html += section('組織拡大している部署', bulletList(r.hiring?.expandingDepts));
    if (r.hiring?.hiringVolume) html += section('採用規模', `<p>${r.hiring.hiringVolume}</p>`);
    if (r.hiring?.usedMedia?.length) html += section('使用媒体', bulletList(r.hiring.usedMedia));
  } else if (idx === 2) {
    // Competitive
    html += section('同じ市場の企業', bulletList(r.competitive?.sameMarket));
    html += section('サービスが似ている企業', bulletList(r.competitive?.similarService));
    html += section('採用で競合しそうな企業', bulletList(r.competitive?.hiringCompetitors));
  } else if (idx === 3) {
    // Hypothesis
    html += '<div class="section-block"><h3>採用課題の仮説</h3>';
    (r.hypothesis?.challenges || []).forEach(c => {
      const tag = `<span class="tag tag-${c.severity||'mid'}">${c.severity==='high'?'🔴 高':c.severity==='low'?'🟢 低':'🟡 中'}</span>`;
      html += `<div class="hypothesis-card"><div class="hc-title">${tag} ${c.title||''}</div><div class="hc-body">${c.description||''}</div></div>`;
    });
    html += '</div>';
    html += section('採用難易度が高いポジション', bulletList(r.hypothesis?.difficultPositions));
    if (r.hypothesis?.marketCompetition) html += section('採用市場での競争状況', `<p>${r.hypothesis.marketCompetition}</p>`);
  } else if (idx === 4) {
    // Proposal
    html += section('人材紹介で支援できる職種', bulletList(r.proposal?.targetRoles));
    html += section('採用戦略の提案余地', bulletList(r.proposal?.strategyAngle));
    html += section('営業トークの切り口', bulletList(r.proposal?.talkingPoints));
  } else if (idx === 5) {
    // Questions
    html += '<div class="section-block"><h3>商談で確認すべき質問</h3>';
    (r.questions || []).forEach((q, i) => {
      html += `<div class="question-item"><div class="q-num">Q${i+1}</div><span>${q}</span></div>`;
    });
    html += '</div>';
  } else if (idx === 6) {
    // JP Value
    html += section('JOB PALETTEが価値提供できる内容', bulletList(r.jpValue?.matchPoints));
    if (r.jpValue?.uniqueStrength) html += section('この企業への独自強み', `<p>${r.jpValue.uniqueStrength}</p>`);
    html += section('提案すべきサービス', bulletList(r.jpValue?.proposedServices));
  }

  el.innerHTML = html;
}

function section(title, contentHtml) {
  return `<div class="section-block"><h3>${title}</h3>${contentHtml}</div>`;
}

function bulletList(arr) {
  if (!arr || !arr.length) return '<p style="color:var(--text-dim);font-size:12px">データなし</p>';
  return `<ul class="bullet-list">${arr.map(i=>`<li>${i}</li>`).join('')}</ul>`;
}

function buildMarkdownReport() {
  const r = analysisResult;
  if (!r) return '';
  const today = new Date().toLocaleDateString('ja-JP');
  let md = `# ${r.companyName || '企業'} 商談前準備資料\n\n**調査日:** ${today}\n\n`;
  md += `## 1. 会社概要\n${r.overview?.business || ''}\n\n`;
  md += `- 従業員数: ${r.overview?.employeeCount || '不明'}\n`;
  md += `- 設立: ${r.overview?.founded || '不明'}\n`;
  md += `- ステージ: ${r.overview?.stage || '不明'}\n`;
  md += `- ターゲット市場: ${r.overview?.targetMarket || ''}\n\n`;
  md += `### 主要サービス\n${(r.overview?.services||[]).map(s=>`- ${s}`).join('\n')}\n\n`;
  md += `## 2. 事業の特徴\n### 競争優位性\n${(r.businessFeatures?.advantages||[]).map(s=>`- ${s}`).join('\n')}\n\n`;
  md += `### 成長領域\n${(r.businessFeatures?.growthAreas||[]).map(s=>`- ${s}`).join('\n')}\n\n`;
  md += `## 3. 採用状況\n### 現在の採用ポジション\n${(r.hiring?.currentPositions||[]).map(s=>`- ${s}`).join('\n')}\n\n`;
  md += `### 採用人数の多い職種\n${(r.hiring?.highVolumeRoles||[]).map(s=>`- ${s}`).join('\n')}\n\n`;
  md += `### 組織拡大部署\n${(r.hiring?.expandingDepts||[]).map(s=>`- ${s}`).join('\n')}\n\n`;
  md += `## 4. 競合企業\n### 採用競合\n${(r.competitive?.hiringCompetitors||[]).map(s=>`- ${s}`).join('\n')}\n\n`;
  md += `## 5. 採用課題の仮説\n`;
  (r.hypothesis?.challenges||[]).forEach(c => {
    md += `### ${c.title}\n${c.description}\n\n`;
  });
  md += `## 6. 営業提案の切り口\n${(r.proposal?.talkingPoints||[]).map(s=>`- ${s}`).join('\n')}\n\n`;
  md += `## 7. 商談で確認すべき質問\n${(r.questions||[]).map((q,i)=>`${i+1}. ${q}`).join('\n')}\n\n`;
  md += `## 8. JOB PALETTEが価値提供できる内容\n${(r.jpValue?.matchPoints||[]).map(s=>`- ${s}`).join('\n')}\n\n`;
  md += `### 独自強み\n${r.jpValue?.uniqueStrength||''}\n\n`;
  md += `### 提案サービス\n${(r.jpValue?.proposedServices||[]).map(s=>`- ${s}`).join('\n')}\n`;
  return md;
}

async function sendToNotion() {
  if (!analysisResult) return;
  const btn = document.getElementById('btnNotion');
  btn.disabled = true;
  btn.innerHTML = '<span>⟳</span> 起票中<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>';

  const r = analysisResult;
  const today = new Date().toISOString().split('T')[0];
  const title = r.notionTitle || `【新規】商談前調査_${r.companyName || '企業'}_${today}`;
  const content = buildMarkdownReport();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [],
        mcp_servers: [{
          type: 'url',
          url: 'https://mcp.notion.com/mcp',
          name: 'notion-mcp'
        }],
        system: 'あなたはNotionページを作成するアシスタントです。指定されたデータソースにページを作成し、結果のURLをJSONで返してください: {"pageUrl": "https://www.notion.so/...", "pageTitle": "タイトル"}',
        messages: [{
          role: 'user',
          content: `以下のMarkdownコンテンツを、Notion議事録DB（data_source_id: 78072f7a-0db2-4ad2-bd73-68f2d47ac94e）に新規ページとして作成してください。

タイトル（名前）: ${title}
議事録種別: 【新規】営業報告書
企業名: ${r.companyName || ''}（もし既存オプションにない場合は最も近いものか空白に）
実施日時: ${today}

コンテンツ:
${content}

作成後、ページのURLとタイトルをJSON形式で返してください。`
        }]
      })
    });

    const data = await response.json();
    let pageUrl = null;

    // Try to extract URL from response
    for (const block of data.content || []) {
      if (block.type === 'text') {
        try {
          const clean = block.text.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
          const match = clean.match(/\{[\s\S]*\}/);
          if (match) {
            const obj = JSON.parse(match[0]);
            pageUrl = obj.pageUrl || obj.url;
          }
        } catch {}
        // Also look for notion URL directly
        if (!pageUrl) {
          const urlMatch = block.text.match(/https:\/\/www\.notion\.so\/[a-zA-Z0-9-]+/);
          if (urlMatch) pageUrl = urlMatch[0];
        }
      }
    }

    const notionResult = document.getElementById('notionResult');
    if (pageUrl) {
      notionResult.innerHTML = `✅ 起票完了 → <a href="${pageUrl}" target="_blank">Notionで開く</a>`;
    } else {
      notionResult.innerHTML = `✅ Notionへ起票しました`;
    }
    setStep(5, 'done');
    showToast('📋 Notionへの起票が完了しました！');
    btn.innerHTML = '<span>✓</span> 起票済み';
  } catch(e) {
    document.getElementById('notionResult').innerHTML = `<span style="color:var(--red)">⚠️ ${e.message}</span>`;
    btn.disabled = false;
    btn.innerHTML = '<span>📋</span> Notionへ起票';
  }
}

function copyAll() {
  const md = buildMarkdownReport();
  navigator.clipboard.writeText(md).then(() => showToast('📋 クリップボードにコピーしました'));
}
